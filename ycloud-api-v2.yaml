          format: int32
          description: Total recipients of this message, including `to`, `cc` and `bcc`.
          example: 3
        totalPrice:
          type: number
          format: double
          description: Total price of this message.
          example: 0.0085
        currency:
          type: string
          description: |-
            Price currency. [ISO 4217 currency code](https://en.wikipedia.org/wiki/ISO_4217).
          example: USD
    EmailContentType:
      type: string
