          example: '2024-08-22T00:00:00.000Z'
        properties:
          type: array
          description: The list of property definitions for the event definition.
          items:
            $ref: '#/components/schemas/CustomEventDefinitionProperty'
    CustomEventDefinitionCreateRequest:
      type: object
