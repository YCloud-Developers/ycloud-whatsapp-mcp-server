      properties:
        status:
          type: integer
          format: int32
          pattern: '[45]\d{2}'
          description: HTTP status code, [RFC 7231, Section 6](https://datatracker.ietf.org/doc/html/rfc7231#section-6). It conveys the HTTP status code used for the convenience of the consumer.
          example: 404
        code:
